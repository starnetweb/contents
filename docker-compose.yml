version: "3.9"

services:
  backend:
    image: ghcr.io/starnetweb/contents/backend:latest
    container_name: content_backend
    restart: unless-stopped
    ports:
      - "4001:4001"
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/content_agent.db
      - SECRET_KEY=${SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BLAZINGPROJECTS_CHAT_ID=${TELEGRAM_BLAZINGPROJECTS_CHAT_ID}
      - TELEGRAM_EXAMKITS_CHAT_ID=${TELEGRAM_EXAMKITS_CHAT_ID}
      - TELEGRAM_WATMALL_CHAT_ID=${TELEGRAM_WATMALL_CHAT_ID}
      - TELEGRAM_PAYAPP_CHAT_ID=${TELEGRAM_PAYAPP_CHAT_ID}
      - TELEGRAM_REALTOUR_CHAT_ID=${TELEGRAM_REALTOUR_CHAT_ID}
      - TELEGRAM_STANETACADEMY_CHAT_ID=${TELEGRAM_STANETACADEMY_CHAT_ID}
      - PORT=4001
      - FRONTEND_URL=http://${VPS_HOST}:3000

  frontend:
    image: ghcr.io/starnetweb/contents/frontend:latest
    container_name: content_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
