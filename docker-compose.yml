version: "3.9"

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    container_name: content_backend
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file:
      - .env
    volumes:
      # Persist SQLite database across deploys
      - db_data:/app/data
      # Override DATABASE_URL to use the mounted volume path
    environment:
      - DATABASE_URL=sqlite:////app/data/content_agent.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    container_name: content_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://${VPS_HOST}:4001

volumes:
  db_data:
