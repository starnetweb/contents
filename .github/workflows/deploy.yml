name: Build & Push Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: ghcr.io/${{ env.REPO }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ vars.VPS_HOST }}:4001
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Images ready
        run: |
          echo "Backend : ghcr.io/${{ env.REPO }}/backend:latest"
          echo "Frontend: ghcr.io/${{ env.REPO }}/frontend:latest"
