name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Log in to GitHub Container Registry ───────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Set up Docker Buildx ───────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Build & push backend image ────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 5. Build & push frontend image ───────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: ghcr.io/${{ env.REPO }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.VPS_HOST }}:4001
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Deploy to Hostinger VPS via SSH ───────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # Go to app directory
            cd /opt/content-agent

            # Log in to GHCR from VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Pull latest images
            export GITHUB_REPOSITORY=${{ github.repository }}
            export VPS_HOST=${{ secrets.VPS_HOST }}
            docker compose pull

            # Restart containers with zero-downtime
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "Deployment complete."
